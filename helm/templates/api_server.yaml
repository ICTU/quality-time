---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ template "api_server_name" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: {{ template "api_server_name" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: {{ template "api_server_name" . }}
  strategy: {}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: {{ template "api_server_name" . }}
    spec:
      containers:
        - name: {{ template "api_server_name" . }}
          image: "{{ .Values.api_server.image.repository }}:{{ .Values.api_server.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-{{ template "api_server_name" . }}-env
                optional: true
          env:
            - name: RENDERER_HOST
              value: {{ .Release.Name }}-{{ template "renderer_name" . }}
            - name: DATABASE_HOST
              value: {{ .Release.Name }}-{{ template "database_name" . }}
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.dbCredential }}
                  key: DATABASE_USERNAME
                  optional: true
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.dbCredential }}
                  key: DATABASE_PASSWORD
                  optional: true
            - name: LDAP_LOOKUP_USER_DN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.ldapCredential }}
                  key: LDAP_LOOKUP_USER_DN
                  optional: true
            - name: LDAP_LOOKUP_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.ldapCredential }}
                  key: LDAP_LOOKUP_USER_PASSWORD
                  optional: true
            - name: LDAP_SEARCH_FILTER  # override to make sure that double dollar signs are processed like in docker
              value: {{ .Values.api_server.env.LDAP_SEARCH_FILTER }}
          securityContext: {{- toYaml .Values.api_server.securityContext | nindent 12 }}
          volumeMounts:
            # Bottle, the web framework used by the API-server, buffers large request bodies,
            # such as imported reports, in temporary files
            - name: tmp
              mountPath: /tmp
            {{- with .Values.api_server.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # The API-server has a variable, potentially long startup (loading example reports, connecting
          # to LDAP and the database, database migrations), so gate the liveness probe behind a startup
          # probe to avoid restarts during startup
          startupProbe:
            httpGet:
              path: /api/internal/health
              port: 5001
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/internal/health
              port: 5001
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/internal/health
              port: 5001
            periodSeconds: 10
            timeoutSeconds: 10
          {{- with .Values.api_server.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      restartPolicy: Always
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with .Values.api_server.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-{{ template "api_server_name" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: {{ template "api_server_name" . }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: {{ template "api_server_name" . }}
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
  sessionAffinity: None
---
{{- if .Values.api_server.env }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-{{ template "api_server_name" . }}-env
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: {{ template "api_server_name" . }}
data:
  {{- range $key, $value := .Values.api_server.env }}
  {{ $key }}: "{{ $value }}"
  {{- end }}
{{- end }}
