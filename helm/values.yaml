---
secrets:
  dbCredential: "quality-time-db-secret"
  ldapCredential: "quality-time-ldap-secret"

api_server:
  securityContext: {}
  extraVolumes: []
#    - name: cert-config-map
#      configMap:
#        name: cert-config-map
  extraVolumeMounts: []
#    - name: cert-config-map
#      subPath: ca-certificates.crt
#      mountPath: "/etc/ssl/certs/ca-certificates.crt"
#      readOnly: true
  image:
    repository: "ictu/quality-time_api_server"
  env:
    LDAP_URL: "ldap://host.docker.internal:389"
    LDAP_ROOT_DN: "dc=example,dc=org"
    LDAP_SEARCH_FILTER: "(|(uid=$$username)(cn=$$username))"

collector:
  securityContext:
    capabilities:
      drop:
        - ALL
  image:
    repository: "ictu/quality-time_collector"

database:
  securityContext:
    capabilities:
      add:
        - CHOWN
        - DAC_OVERRIDE
        - SETGID
        - SETUID
      drop:
        - ALL
  image:
    repository: "ictu/quality-time_database"
  resources:
    limits:
      cpu: "2"
      memory: "2Gi"
    requests:
      cpu: "1"
      memory: "1Gi"

frontend:
  securityContext:
    capabilities:
      drop:
        - ALL
  image:
    repository: "ictu/quality-time_frontend"

notifier:
  securityContext:
    capabilities:
      drop:
        - ALL
  image:
    repository: "ictu/quality-time_notifier"

renderer:
  securityContext:
    capabilities:
      drop:
        - ALL
  image:
    repository: "ictu/quality-time_renderer"
  env:
    LC_ALL: "en_GB.UTF-8"
    TZ: "Europe/Amsterdam"

www:
  securityContext:
    capabilities:
      add:
        - CHOWN
        - SETGID
        - SETUID
        - NET_BIND_SERVICE
      drop:
        - ALL
  # -- When www.deployProxy is false the quality-time_proxy is not used and ingress is pointed directly to the backend api and frontend.
  deployProxy: true
  image:
    repository: "ictu/quality-time_proxy"
  ingress:
    enabled: false
    ingressClassName: ""
    hostname: ""
    pathType: "ImplementationSpecific"
    annotations: {}
