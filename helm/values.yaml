---
secrets:
  dbCredential: "quality-time-db-secret"
  ldapCredential: "quality-time-ldap-secret"

api_server:
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  extraVolumes: []
  #    - name: cert-config-map
  #      configMap:
  #        name: cert-config-map
  extraVolumeMounts: []
  #    - name: cert-config-map
  #      subPath: ca-certificates.crt
  #      mountPath: "/etc/ssl/certs/ca-certificates.crt"
  #      readOnly: true
  image:
    pullPolicy: "Always"
    repository: "ictu/quality-time_api_server"
  env:
    LDAP_URL: "ldap://host.docker.internal:389"
    LDAP_ROOT_DN: "dc=example,dc=org"
    LDAP_SEARCH_FILTER: "(|(uid=$$username)(cn=$$username))"

collector:
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  image:
    pullPolicy: "Always"
    repository: "ictu/quality-time_collector"
  env:
    # The health check file is written to /tmp because that is the only writable folder
    # with a read-only root filesystem; the liveness probe reads the same environment variable
    HEALTH_CHECK_FILE: "/tmp/health_check.txt"

database:
  storageSize: "1Gi"
  securityContext:
    capabilities:
      add:
        - CHOWN
        - DAC_OVERRIDE
        - SETGID
        - SETUID
      drop:
        - ALL
    readOnlyRootFilesystem: true
  image:
    pullPolicy: "Always"
    repository: "ictu/quality-time_database"
  resources:
    limits:
      cpu: "2"
      memory: "2Gi"
    requests:
      cpu: "1"
      memory: "1Gi"

frontend:
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  image:
    pullPolicy: "Always"
    repository: "ictu/quality-time_frontend"

notifier:
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  image:
    pullPolicy: "Always"
    repository: "ictu/quality-time_notifier"
  env:
    # The health check file is written to /tmp because that is the only writable folder
    # with a read-only root filesystem; the liveness probe reads the same environment variable
    HEALTH_CHECK_FILE: "/tmp/health_check.txt"

renderer:
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  image:
    pullPolicy: "Always"
    repository: "ictu/quality-time_renderer"
  env:
    LC_ALL: "en_GB.UTF-8"
    TZ: "Europe/Amsterdam"
    # Point the configuration and cache folders of Chromium, which include the Crashpad crash handler
    # database and the fontconfig cache, to /tmp, the only writable folder with a read-only root filesystem
    XDG_CONFIG_HOME: "/tmp"
    XDG_CACHE_HOME: "/tmp"

www:
  securityContext:
    capabilities:
      add:
        - CHOWN
        - SETGID
        - SETUID
        - NET_BIND_SERVICE
      drop:
        - ALL
    readOnlyRootFilesystem: true
  # -- When www.deployProxy is false the quality-time_proxy is not used and ingress is pointed directly to the backend api and frontend. Note that this breaks PDF-exports. See https://github.com/ICTU/quality-time/issues/13065.
  deployProxy: true
  image:
    pullPolicy: "Always"
    repository: "ictu/quality-time_proxy"
  ingress:
    enabled: false
    ingressClassName: ""
    hostname: ""
    pathType: "ImplementationSpecific"
    annotations: {}
