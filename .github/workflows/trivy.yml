---
name: Trivy

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 0 * * *"
permissions:
  contents: read
jobs:
  check-suppressions:
    name: Check Trivy suppression expiry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Fail on expired .trivyignore.yaml entries
        run: |
          today=$(date --utc +%F)
          expired=0
          while read -r expiry; do
            if [[ "${expiry}" < "${today}" ]]; then
              msg="Trivy suppression expired on ${expiry} (today ${today}); remove or extend the entry."
              echo "::error file=.trivyignore.yaml::${msg}"
              expired=1
            fi
          done < <(grep --only-matching --perl-regexp 'expired_at:\s*\K[0-9]{4}-[0-9]{2}-[0-9]{2}' .trivyignore.yaml)
          exit "${expired}"

  build:
    name: Trivy component analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - component: api_server
            build_path: .
            docker_file: components/python.Dockerfile
          - component: collector
            build_path: .
            docker_file: components/python.Dockerfile
          - component: database
            build_path: components/database
            docker_file: Dockerfile
          - component: frontend
            build_path: components/frontend
            docker_file: Dockerfile
          - component: notifier
            build_path: .
            docker_file: components/python.Dockerfile
          - component: proxy
            build_path: components/proxy
            docker_file: Dockerfile
          - component: renderer
            build_path: components/renderer
            docker_file: Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build image from Dockerfile
        working-directory: ${{ matrix.build_path }}
        run: docker build --build-arg COMPONENT=${{ matrix.component}} -f ${{ matrix.docker_file }} -t docker.io/ictu/quality-time_${{ matrix.component }} . # yamllint disable-line rule:line-length

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "docker.io/ictu/quality-time_${{ matrix.component }}"
          ignore-unfixed: true
          trivyignores: ".trivyignore.yaml"
          format: "sarif"
          output: "trivy-${{ matrix.component }}.sarif"
          version: v0.70.0

      - name: Upload Trivy scan results to GitHub Security tab
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: "trivy-${{ matrix.component }}.sarif"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "trivy-${{ matrix.component }}.sarif"
          path: "*.sarif"
