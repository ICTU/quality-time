---
name: Documentation

# yamllint disable-line rule:truthy
on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
          version-file: tools/third_party/pyproject.toml
      - name: Install dependencies, run unit tests and check quality
        run: uv tool run --directory docs --from $(uv export --project tools/third_party --only-group just --quiet --no-hashes --no-header) just ci # yamllint disable-line rule:line-length
      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz
      - name: Build documentation
        run: uv tool run --directory docs --from $(uv export --project tools/third_party --only-group just --quiet --no-hashes --no-header) just build # yamllint disable-line rule:line-length
