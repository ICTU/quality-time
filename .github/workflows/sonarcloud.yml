---
name: SonarCloud

# yamllint disable-line rule:truthy
on:
  push:
    branches: [master]
  pull_request:

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    permissions: {}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Login to DockerHub
        if: env.SONAR_TOKEN != null
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: env.SONAR_TOKEN != null
        with:
          fetch-depth: 0 # Disabling shallow clone is recommended for improving relevancy of reporting
          persist-credentials: false
      - name: Install uv
        if: env.SONAR_TOKEN != null
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version-file: tools/third_party/pyproject.toml
      - name: Setup Node.js
        if: env.SONAR_TOKEN != null
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: components/frontend/package.json
      - name: Collector
        if: env.SONAR_TOKEN != null
        working-directory: components/collector
        # yamllint disable rule:line-length
        run: |
          uv tool run --from $(uv export --project ../../tools/third_party --only-group just --quiet --no-hashes --no-header) just test
          export PYTHONPATH=`python -c 'import sys;print(":".join(sys.argv[1:]))' src $PYTHONPATH`
          uv run --with=unittest-xml-reporting -m xmlrunner --output-file build/unittests.xml
        # yamllint enable rule:line-length
      - name: Notifier
        if: env.SONAR_TOKEN != null
        working-directory: components/notifier
        # yamllint disable rule:line-length
        run: |
          uv tool run --from $(uv export --project ../../tools/third_party --only-group just --quiet --no-hashes --no-header) just test
          export PYTHONPATH=`python -c 'import sys;print(":".join(sys.argv[1:]))' src $PYTHONPATH`
          uv run --with=unittest-xml-reporting -m xmlrunner --output-file build/unittests.xml
        # yamllint enable rule:line-length
      - name: API-server
        if: env.SONAR_TOKEN != null
        working-directory: components/api_server
        # yamllint disable rule:line-length
        run: |
          uv tool run --from $(uv export --project ../../tools/third_party --only-group just --quiet --no-hashes --no-header) just test
          export PYTHONPATH=`python -c 'import sys;print(":".join(sys.argv[1:]))' src $PYTHONPATH`
          uv run --with=unittest-xml-reporting -m xmlrunner --output-file build/unittests.xml
        # yamllint enable rule:line-length
      - name: Shared Code
        if: env.SONAR_TOKEN != null
        working-directory: components/shared_code
        # yamllint disable rule:line-length
        run: |
          uv tool run --from $(uv export --project ../../tools/third_party --only-group just --quiet --no-hashes --no-header) just test
          export PYTHONPATH=`python -c 'import sys;print(":".join(sys.argv[1:]))' src $PYTHONPATH`
          uv run --with=unittest-xml-reporting -m xmlrunner --output-file build/unittests.xml
        # yamllint enable rule:line-length
      - name: Frontend
        if: env.SONAR_TOKEN != null
        env:
          CI: true
        run: uv tool run --directory components/frontend --from $(uv export --project tools/third_party --only-group just --quiet --no-hashes --no-header) just test --coverage=yes # yamllint disable-line rule:line-length
      - name: Create packages
        if: env.SONAR_TOKEN != null
        # yamllint disable rule:line-length
        run: |
          touch components/__init__.py
          for dir in api_server collector notifier shared_code; do
            touch components/$dir/__init__.py
            touch components/$dir/src/__init__.py
            sed -i "s#name=\"\([^\"]*\)\" filename=\"\([^\"]*\)\"#name=\"$GITHUB_WORKSPACE/components/$dir/\2\" filename=\"$GITHUB_WORKSPACE/components/$dir/\2\"#g" components/$dir/build/unittest-coverage.xml
            sed -i "s#file=\"#file=\"$GITHUB_WORKSPACE/components/$dir/#g" components/$dir/build/unittests.xml
            sed -i "s#classname=\"#classname=\"components.$dir.#g" components/$dir/build/unittests.xml
          done
        # yamllint enable rule:line-length
      - name: Sonarcloud scan
        if: env.SONAR_TOKEN != null
        uses: sonarsource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
