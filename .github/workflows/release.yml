---
name: Release

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - "v*"

jobs:
  containers:
    name: Push container images to Docker Hub
    runs-on: ubuntu-latest
    permissions: {}
    strategy:
      matrix:
        include:
          - component: api_server
            context:
            file: components/python.Dockerfile
          - component: collector
            context:
            file: components/python.Dockerfile
          - component: database
            context: components/database
            file:
          - component: frontend
            context: components/frontend
            file:
          - component: notifier
            context:
            file: components/python.Dockerfile
          - component: proxy
            context: components/proxy
            file:
          - component: renderer
            context: components/renderer
            file:
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push ${{ matrix.component }} to Docker Hub
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-args: COMPONENT=${{ matrix.component }}
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          tags: ictu/quality-time_${{ matrix.component }}:${{ github.ref_name }}
          sbom: true
          push: true
          provenance: mode=max
  finalize:
    name: Finalize release
    needs: containers
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Helm chart to Docker Hub
        working-directory: helm
        run: |
          helm package .
          helm push quality-time-*.tgz oci://registry-1.docker.io/ictu
      - name: Generate changes for this release
        run: tools/release/src/latest_release_changelog.py docs/src/changelog.md > ${{ github.workspace }}-CHANGELOG.txt
      - name: Create GitHub release # zizmor: ignore[superfluous-actions]
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          prerelease: ${{ contains(github.ref_name, 'rc') }}
          body_path: ${{ github.workspace }}-CHANGELOG.txt
