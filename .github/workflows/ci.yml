---
name: CI

# yamllint disable-line rule:truthy
on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions: {}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - folder: components/collector
            name: components-collector
            language: python
          - folder: components/notifier
            name: components-notifier
            language: python
          - folder: components/api_server
            name: components-api_server
            language: python
          - folder: components/shared_code
            name: components-shared_code
            language: python
          - folder: components/frontend
            name: components-frontend
            language: js
          - folder: components/renderer
            name: components-renderer
            language: js
          - folder: tools/release
            name: tools-release
            language: python
          - folder: tools/third_party
            name: tools-third_party
            language: python
          - folder: tools/update_dependencies
            name: tools-update_dependencies
            language: python
          - folder: tests/application_tests
            name: tests-application_tests
            language: python
          - folder: tests/feature_tests
            name: tests-feature_tests
            language: python
    steps:
      - name: Login to DockerHub
        if: env.SONAR_TOKEN != null
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          version-file: tools/third_party/pyproject.toml
      - name: Setup Node.js
        if: matrix.language == 'js'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ matrix.folder }}/package.json
      - name: Run tests and quality checks
        run: uv tool run --directory ${{ matrix.folder }} --from $(uv export --project tools/third_party --only-group just --quiet --no-hashes --no-header) just ci # yamllint disable-line rule:line-length
      - name: Upload build artifacts
        if: env.SONAR_TOKEN != null
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonar-${{ matrix.name }}
          path: ${{ matrix.folder }}/build
          retention-days: 1

  scan:
    needs: test
    runs-on: ubuntu-latest
    permissions: {}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: env.SONAR_TOKEN != null
        with:
          fetch-depth: 0 # Disabling shallow clone is recommended for improving relevancy of reporting
          persist-credentials: false
      - name: Download build artifacts
        if: env.SONAR_TOKEN != null
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: sonar-*
      - name: Restore artifacts to component build directories
        if: env.SONAR_TOKEN != null
        # yamllint disable rule:line-length
        run: |
          for dir in components/api_server components/collector components/notifier components/shared_code components/frontend components/renderer tools/release tools/update_dependencies; do
            mkdir -p $dir/build
            cp -r artifacts/sonar-${dir//\//-}/. $dir/build/
          done
        # yamllint enable rule:line-length
      - name: Create packages
        if: env.SONAR_TOKEN != null
        # yamllint disable rule:line-length
        run: |
          touch components/__init__.py
          touch tools/__init__.py
          for dir in components/api_server components/collector components/notifier components/shared_code tools/release tools/update_dependencies; do
            touch $dir/__init__.py
            touch $dir/src/__init__.py
            sed --in-place "s#name=\"\([^\"]*\)\" filename=\"\([^\"]*\)\"#name=\"$GITHUB_WORKSPACE/$dir/\2\" filename=\"$GITHUB_WORKSPACE/$dir/\2\"#g" $dir/build/unittest-coverage.xml
            sed --in-place "s#file=\"#file=\"$GITHUB_WORKSPACE/$dir/#g" $dir/build/unittests.xml
            sed --in-place "s#classname=\"#classname=\"${dir//\//-}.#g" $dir/build/unittests.xml
          done
        # yamllint enable rule:line-length
      - name: Sonarcloud scan
        if: env.SONAR_TOKEN != null
        uses: sonarsource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
