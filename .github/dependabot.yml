---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/tools/third_party"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/components/collector"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directories:
      - "/components"
      - "/components/database"
      - "/components/frontend"
      - "/components/proxy"
      - "/components/renderer"
      - "/components/testdata"
      - "/components/testldap"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: "/components/frontend"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/components/notifier"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: "/components/renderer"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/components/api_server"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/components/shared_code"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: "/docs"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/docs"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/tools/release"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/tests/application_tests"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/tests/feature_tests"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
