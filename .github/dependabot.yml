    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: "/components/api_server"
    registries:
      - docker-hardened-images
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/components/api_server"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
