---
version: 2
registries:
  docker-hardened-images:
    type: docker-registry
    url: https://dhi.io
    username: ${{secrets.DEPENDABOT_DOCKER_USERNAME}}
    password: ${{secrets.DEPENDABOT_DOCKER_PASSWORD}}
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/tools/third_party"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/tools/update_dependencies"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/components/collector"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: "/components/collector"
    registries:
      - docker-hardened-images
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: "/components/database"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: "/components/frontend"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: "/components/frontend"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: uv
    directory: "/components/notifier"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: "/components/notifier"
    registries:
      - docker-hardened-images
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: "/components/proxy"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: "/components/renderer"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: npm
