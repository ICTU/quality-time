---
# Extra services and overridden parameters for development

x-security-opt: &security-opt
  - no-new-privileges:true

services:
  www:
    build: ../components/proxy
  frontend:
    build: ../components/frontend
  collector:
    environment:
      - COLLECTOR_LOG_LEVEL=${COLLECTOR_LOG_LEVEL:-INFO}
    build:
      context: ..
      dockerfile: components/collector/Dockerfile
    depends_on:
      - testdata
  notifier:
    environment:
      - NOTIFIER_LOG_LEVEL=${NOTIFIER_LOG_LEVEL:-INFO}
    build:
      context: ..
      dockerfile: components/notifier/Dockerfile
  api_server:
    environment:
      - API_SERVER_LOG_LEVEL=${API_SERVER_LOG_LEVEL:-INFO}
    build:
      context: ..
      dockerfile: components/api_server/Dockerfile
    depends_on:
      - ldap
      - renderer
  database:
    build: ../components/database
    ports:
      - "127.0.0.1:27017:27017"
  renderer:
    build: ../components/renderer
    ports:
      - "127.0.0.1:9000:9000"
  testdata:
    build: ../components/testdata
    ports:
      - "127.0.0.1:8000:8000"
    cap_drop:
      - ALL
    security_opt: *security-opt
  mongo-express:
    image: mongo-express:1.0.2
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_INITDB_ROOT_USERNAME:-root}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-root}
      - ME_CONFIG_MONGODB_SERVER=database
    depends_on:
      - database
    cap_drop:
      - ALL
    security_opt: *security-opt
  ldap:
    build: ../components/testldap
    ports:
      - "127.0.0.1:389:389"
    security_opt: *security-opt
