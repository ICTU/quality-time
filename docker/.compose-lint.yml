---
# Configuration for compose-lint (https://github.com/tmatens/compose-lint).
#
# The rules disabled below reflect deliberate trade-offs for docker-compose.yml
# as shipped: it serves both local development and as a starting point for
# production-style deployments (Compose-based or Helm-based). Operators are
# expected to layer additional hardening for their environment. Any new
# findings outside this set will fail `just check`.

rules:
  CL-0005:
    exclude_services:
      www: >-
        The www service is the product's reverse proxy and is intended to
        be the publicly reachable entry point. Binding to 127.0.0.1 would
        defeat its purpose. Operators terminating TLS in front of Quality-time
        can override the port mapping (and bind address) in their own
        override file or Helm chart.
  CL-0006:
    exclude_services:
      ldap: >-
        Test LDAP service from docker-compose.override.yml /
        docker-compose.ci.yml; not part of the product and never run in
        production.
  CL-0007:
    exclude_services:
      ldap: >-
        Test LDAP service from docker-compose.override.yml /
        docker-compose.ci.yml; not part of the product and never run in
        production.
      mongo-express: >-
        MongoDB viewer service from docker-compose.override.yml /
        docker-compose.ci.yml; not part of the product and never run in
        production.
      selenium: >-
        Browser-based test runner from docker-compose.ci.yml. Chromium /
        Firefox sandboxing typically needs specific caps; cap_drop ALL would
        likely break test execution.
  CL-0019:
    enabled: false
    reason: >-
      Quality-time images are pinned to the release tag
      ${QUALITY_TIME_VERSION} rather than an immutable digest. The release
      process treats published tags as immutable, and adding a digest pin
      would require updating these files on every release.
